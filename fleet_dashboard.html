<meta charset="utf-8" />
<title>Fleet Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

#map {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 100%;
}

.side-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 12px;
    padding: 16px;
    z-index: 1000;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}

.side-panel h2 {
    margin: 0 0 12px;
    font-size: 18px;
}

.summary-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
    padding: 7px 8px;
    border-radius: 8px;
    cursor: pointer;
}

.summary-row:hover,
.summary-row.active-filter {
    background: #f3f4f6;
}

.summary-row strong {
    margin-left: auto;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.device-list {
    margin-top: 14px;
    max-height: 300px;
    overflow-y: auto;
    border-top: 1px solid #e5e7eb;
    padding-top: 10px;
}

.device-item {
    padding: 9px 8px;
    border-radius: 8px;
    cursor: pointer;
    border-bottom: 1px solid #f3f4f6;
}

.device-item:hover {
    background: #f9fafb;
}

.device-name {
    font-weight: bold;
    font-size: 13px;
}

.device-meta {
    font-size: 12px;
    color: #6b7280;
    margin-top: 3px;
}
</style>
</head>

<body>
<div id="map"></div>

<div class="side-panel">

o": "22 hr ago", "location": "Perth CBD"}, {"device_id": "TRK028", "name": "SunRoute Sedan 28", "status": "idle", "battery_pct": 45, "lat": -37.558362, "lon": 143.845928, "last_seen": "2026-04-24 08:03:00", "last_seen_ago": "4 hr ago", "location": "Ballarat"}, {"device_id": "TRK029", "name": "FastFreight SUV 29", "status": "offline", "battery_pct": 5, "lat": -33.864158, "lon": 151.208856, "last_seen": "2026-04-24 07:01:00", "last_seen_ago": "5 hr ago", "location": "Sydney CBD"}, {"device_id": "TRK030", "name": "PrimeLogistics Truck 30", "status": "offline", "battery_pct": 3, "lat": -38.156611, "lon": 144.355335, "last_seen": "2026-04-23 20:05:00", "last_seen_ago": "16 hr ago", "location": "Geelong"}, {"device_id": "TRK032", "name": "FastFreight Van 32", "status": "maintenance", "battery_pct": 72, "lat": -33.87, "lon": 151.21, "last_seen": "2026-04-24 07:30:00", "last_seen_ago": "4 hr ago", "location": "Sydney CBD"}, {"device_id": "TRK033", "name": "CityFleet Truck 33", "status": "active", "battery_pct": 150, "lat": -37.814, "lon": 144.963, "last_seen": "2026-04-24 09:05:00", "last_seen_ago": "3 hr ago", "location": "Melbourne CBD"}, {"device_id": "TRK035", "name": "SunRoute SUV 35", "status": "idle", "battery_pct": -5, "lat": -27.47, "lon": 153.0255, "last_seen": "2027-06-15 14:00:00", "last_seen_ago": "Future timestamp", "location": "Brisbane CBD"}];
var statusColors = {"active": "#16a34a", "idle": "#f59e0b", "offline": "#6b7280", "low_battery": "#dc2626", "maintenance": "#3b82f6"};
var currentStatus = "all";
var markers = [];

var map = L.map("map").setView([-34.22843578787879, 142.35244618181818], 4);

L.tileLayer("https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

function popupHtml(device) {
    return `
        <strong>${device.name}</strong><br>
        Device ID: ${device.device_id}<br>
        Status: ${device.status.replace("_", " ")}<br>
        Battery: ${device.battery_pct}%<br>
        Location: ${device.location}<br>
        Last Seen: ${device.last_seen_ago}
    `;
}

function createMarkers() {
    devices.forEach(function(device) {
        var marker = L.circleMarker([device.lat, device.lon], {
            radius: 8,
            color: "#ffffff",
            weight: 2,
            fillColor: statusColors[device.status],
            fillOpacity: 1
        });

        marker.bindPopup(popupHtml(device));

        marker.deviceStatus = device.status;
        marker.deviceId = device.device_id;
        marker.deviceData = device;

        marker.addTo(map);
        markers.push(marker);
    });
}

function applyFilter(status) {
    markers.forEach(function(marker) {
        map.removeLayer(marker);

        if (status === "all" || marker.deviceStatus === status) {
            marker.addTo(map);
        }
    });

    map.closePopup();
}

function renderDeviceList() {
    var list = document.getElementById("device-list");
    list.innerHTML = "";

    var filteredDevices = devices.filter(function(device) {
        return currentStatus === "all" || device.status === currentStatus;
    });

    filteredDevices.forEach(function(device) {
        var item = document.createElement("div");
        item.className = "device-item";

        item.innerHTML = `
            <div class="device-name">${device.name}</div>
            <div class="device-meta">
                ${device.device_id} · ${device.status.replace("_", " ")} · ${device.battery_pct}%
            </div>
            <div class="device-meta">${device.location} · ${device.last_seen_ago}</div>
        `;

        item.addEventListener("click", function() {
            var selectedMarker = markers.find(function(marker) {
                return marker.deviceId === device.device_id;
            });

            if (selectedMarker) {
                map.closePopup();

                map.flyTo([device.lat, device.lon], 10);
                selectedMarker.openPopup();
            }
        });

        list.appendChild(item);
    });
}

document.querySelectorAll(".summary-row").forEach(function(row) {
    row.addEventListener("click", function() {
        document.querySelectorAll(".summary-row").forEach(function(item) {
            item.classList.remove("active-filter");
        });

        row.classList.add("active-filter");
        currentStatus = row.dataset.status;

        applyFilter(currentStatus);
        renderDeviceList();
    });
});

createMarkers();
renderDeviceList();
</script>
